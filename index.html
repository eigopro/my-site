<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語予習ProMaster</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans transition-colors duration-300 antialiased">

    <!-- 常時最上部に固定されるヘッダーエリア -->
    <div class="sticky top-0 z-50 bg-slate-950/90 backdrop-blur-md border-b border-slate-855 shadow-md">
        <!-- ヘッダー本体 -->
        <header class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <!-- タイトルロゴをクリックするとホームに遷移する仕様 -->
            <div id="header-home-btn" class="flex items-center space-x-3.5 cursor-pointer select-none group transition-all" title="ホーム画面に戻る">
                <div class="bg-gradient-to-br from-blue-600 to-slate-800 p-2.5 rounded-xl text-white shadow-lg shadow-blue-600/20 group-hover:scale-105 transition-all duration-300">
                    <i data-lucide="graduation-cap" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tight text-white group-hover:text-blue-400 transition-all duration-300">
                        <span>英語予習ProMaster</span>
                    </h1>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Logical English Prep System</p>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <span class="flex h-2 w-2 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                </span>
                <span class="text-[10px] text-slate-300 font-bold font-mono bg-slate-855 px-2.5 py-1 rounded-lg border border-slate-800">Coming Soon</span>
            </div>
        </header>

        <!-- 上部タブバー：ホーム画面では非表示、各モードの学習画面でのみ現れる -->
        <div id="mode-tab-bar" class="px-6 py-2.5 bg-slate-950/50 flex items-center space-x-2 overflow-x-auto scrollbar-none hidden z-30">
            <div class="max-w-4xl w-full mx-auto flex items-center space-x-2 overflow-x-auto scrollbar-none">
                <button onclick="selectTab(0)" id="tab-btn-0" class="flex items-center space-x-1.5 px-4 py-2 rounded-xl text-xs font-bold transition-all text-center whitespace-nowrap">
                    <i data-lucide="message-circle" class="w-3.5 h-3.5"></i>
                    <span>英語コミュニケーション</span>
                </button>
                <button onclick="selectTab(1)" id="tab-btn-1" class="flex items-center space-x-1.5 px-4 py-2 rounded-xl text-xs font-bold transition-all text-center whitespace-nowrap">
                    <i data-lucide="brain-circuit" class="w-3.5 h-3.5"></i>
                    <span>論理表現</span>
                </button>
                <button onclick="selectTab(2)" id="tab-btn-2" class="flex items-center space-x-1.5 px-4 py-2 rounded-xl text-xs font-bold transition-all text-center whitespace-nowrap">
                    <i data-lucide="highlighter" class="w-3.5 h-3.5"></i>
                    <span>英文添削機能</span>
                </button>
            </div>
        </div>
    </div>

    <!-- メインコンテンツ領域（最大幅を4xlに絞り、中央寄せにしたスタイリッシュなフル画面デザイン） -->
    <main class="flex-1 max-w-4xl w-full mx-auto p-4 md:p-6 flex flex-col justify-stretch overflow-hidden">
        
        <!-- メイン表示カード -->
        <section id="main-content-panel" class="flex-1 bg-slate-955 border border-slate-800 rounded-2xl flex flex-col overflow-hidden shadow-[0_8px_30px_rgb(0,0,0,0.3)] relative min-h-[500px] transition-all duration-300 backdrop-blur-sm">
            
            <!-- ホーム画面（起動時やロゴクリック時に表示されるスタイリッシュなメニュー） -->
            <div id="home-container" class="absolute inset-0 flex flex-col justify-center p-6 md:p-12 overflow-y-auto space-y-10 bg-gradient-to-b from-slate-950/20 via-slate-950/40 to-slate-950/60 z-20">
                <div class="space-y-3.5 text-center max-w-2xl mx-auto">
                    <h2 class="text-2xl font-extrabold tracking-tight text-white flex items-center justify-center space-x-2">
                        <span>Welcome to ProMaster Dashboard</span>
                    </h2>
                    <p class="text-xs md:text-sm text-slate-400 leading-relaxed font-semibold">
                        学校の宿題や教科書の予習を効率よく進められる学習モードが揃っています。<br>始めたい機能を以下の3つのパネルから選択してください。
                    </p>
                </div>

                <!-- 3つの大きな四角（Mode選択カード） -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl w-full mx-auto" id="home-navigation-cards">
                    
                    <!-- 1. 英語コミュニケーション -->
                    <button onclick="selectTab(0)" class="p-6 bg-slate-900/60 hover:bg-slate-900/90 border border-slate-800 hover:border-blue-500 rounded-2xl text-left transition-all duration-300 flex flex-col justify-between h-48 group shadow-md shadow-black/20">
                        <div class="flex justify-between items-start w-full">
                            <div class="p-3.5 bg-slate-955 text-blue-400 group-hover:bg-blue-600 group-hover:text-white transition-all duration-300 shadow-sm rounded-xl">
                                <i data-lucide="message-circle" class="w-6 h-6"></i>
                            </div>
                            <span class="text-[9px] font-bold text-slate-400 group-hover:text-blue-600 bg-slate-955 px-2 py-0.5 rounded uppercase tracking-wider font-mono transition-colors border border-slate-800">Mode 1</span>
                        </div>
                        <div class="space-y-1.5">
                            <span class="text-sm font-extrabold text-slate-100 block group-hover:text-blue-400 transition-colors">英語コミュニケーション</span>
                            <span class="text-[10px] text-slate-455 block leading-relaxed font-semibold">本文プリントの予習</span>
                        </div>
                    </button>

                    <!-- 2. 論理表現 -->
                    <button onclick="selectTab(1)" class="p-6 bg-slate-900/60 hover:bg-slate-900/90 border border-slate-800 hover:border-blue-500 rounded-2xl text-left transition-all duration-300 flex flex-col justify-between h-48 group shadow-md shadow-black/20">
                        <div class="flex justify-between items-start w-full">
                            <div class="p-3.5 bg-slate-955 text-blue-400 group-hover:bg-blue-600 group-hover:text-white transition-all duration-300 shadow-sm rounded-xl">
                                <i data-lucide="brain-circuit" class="w-6 h-6"></i>
                            </div>
                            <span class="text-[9px] font-bold text-slate-400 group-hover:text-blue-600 bg-slate-955 px-2 py-0.5 rounded uppercase tracking-wider font-mono transition-colors border border-slate-800">Mode 2</span>
                        </div>
                        <div class="space-y-1.5">
                            <span class="text-sm font-extrabold text-slate-100 block group-hover:text-blue-400 transition-colors">論理表現</span>
                            <span class="text-[10px] text-slate-455 block leading-relaxed font-semibold">教科書・ワーク・プリントの解答</span>
                        </div>
                    </button>

                    <!-- 3. 英文添削機能 -->
                    <button onclick="selectTab(2)" class="p-6 bg-slate-900/60 hover:bg-slate-900/90 border border-slate-800 hover:border-blue-500 rounded-2xl text-left transition-all duration-300 flex flex-col justify-between h-48 group shadow-md shadow-black/20">
                        <div class="flex justify-between items-start w-full">
                            <div class="p-3.5 bg-slate-955 text-blue-400 group-hover:bg-blue-600 group-hover:text-white transition-all duration-300 shadow-sm rounded-xl">
                                <i data-lucide="highlighter" class="w-6 h-6"></i>
                            </div>
                            <span class="text-[9px] font-bold text-slate-400 group-hover:text-blue-600 bg-slate-955 px-2 py-0.5 rounded uppercase tracking-wider font-mono transition-colors border border-slate-800">Mode 3</span>
                        </div>
                        <div class="space-y-1.5">
                            <span class="text-sm font-extrabold text-slate-100 block group-hover:text-blue-400 transition-colors">英文添削機能</span>
                            <span class="text-[10px] text-slate-455 block leading-relaxed font-semibold">自分が書いた文章をAIがチェック・解説</span>
                        </div>
                    </button>

                </div>
            </div>

            <!-- 【全モード共通】準備中・近日公開プレースホルダーエリア -->
            <div id="placeholder-container" class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center bg-slate-955 z-10 hidden">
                <div class="w-16 h-16 rounded-2xl bg-slate-900 border border-slate-800 flex items-center justify-center text-blue-400 mb-4 animate-pulse shadow-sm">
                    <i data-lucide="hourglass" class="w-8 h-8"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-100 mb-1.5" id="placeholder-title">モード名</h3>
                <p class="text-xs text-slate-400 max-w-sm leading-relaxed mb-6 font-semibold" id="placeholder-desc">
                    このモードの画面表示は現在、準備中です。<br>近日公開予定ですので、どうぞ楽しみにお待ちください！
                </p>
            </div>
        </section>

    </main>

    <!-- フッター -->
    <footer class="border-t border-slate-800 bg-slate-950/60 py-4 px-6 text-center text-xs text-slate-500 font-medium">
        <p>&copy; 2026 英語予習ProMaster. 全ての若い学習者に向けて健康的で安全な学習環境を提供します。</p>
    </footer>

    <!-- 通知トースト -->
    <div id="toast" class="fixed bottom-6 right-6 bg-slate-950 border border-slate-800 text-slate-100 px-4 py-3 rounded-xl shadow-xl max-w-sm flex items-center space-x-3 transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none z-50">
        <i data-lucide="alert-circle" class="w-5 h-5 text-blue-600 shrink-0"></i>
        <p class="text-xs font-bold" id="toast-message">メッセージ</p>
    </div>

    <script>
        // 英語予習ProMaster専用 プリセットデータ
        const presets = [
            {
                name: "英語コミュニケーション",
                shortName: "英コ",
                desc: "本文プリントの予習",
                icon: "message-circle"
            },
            {
                name: "論理表現",
                shortName: "論表",
                desc: "教科書・ワーク・プリントの解答",
                icon: "brain-circuit"
            },
            {
                name: "英文添削機能",
                shortName: "英文添削",
                desc: "自分が書いた文章をAIがチェック・解説",
                icon: "highlighter"
            }
        ];

        // 状態管理
        let activeTabIndex = 0; // タブ選択（0: 英語コミュニケーション, 1: 論理表現, 2: 英文添削機能）

        // DOM要素
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');

        // 表示切替用DOM
        const modeTabBar = document.getElementById('mode-tab-bar');
        const placeholderContainer = document.getElementById('placeholder-container');
        const placeholderTitle = document.getElementById('placeholder-title');
        const placeholderDesc = document.getElementById('placeholder-desc');
        const homeContainer = document.getElementById('home-container');
        const headerHomeBtn = document.getElementById('header-home-btn');

        // 初期設定
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            showHomeView(); // 最初はホーム画面を表示
            
            // ヘッダーロゴのホームボタン機能のイベント登録
            headerHomeBtn.addEventListener('click', () => {
                showHomeView();
            });
        });

        // ホーム画面を呼び出す関数（ロゴクリック時用）
        function showHomeView() {
            homeContainer.classList.remove('hidden');
            placeholderContainer.classList.add('hidden');
            if (modeTabBar) modeTabBar.classList.add('hidden'); // タブバーを非表示にする
            lucide.createIcons();
        }

        // 選択された各モードの有効化処理（すべて準備中画面へ誘導します）
        function selectTab(index) {
            activeTabIndex = index;

            // ホーム画面を隠す
            homeContainer.classList.add('hidden');

            // モード切り替えタブバーを表示し、アクティブ状態をコントロール
            if (modeTabBar) {
                modeTabBar.classList.remove('hidden');
                for (let i = 0; i < 3; i++) {
                    const btn = document.getElementById(`tab-btn-${i}`);
                    if (btn) {
                        if (i === index) {
                            btn.className = "flex items-center space-x-1.5 px-4 py-2 rounded-xl text-xs font-bold transition-all text-center whitespace-nowrap bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-lg shadow-blue-500/10";
                        } else {
                            btn.className = "flex items-center space-x-1.5 px-4 py-2 rounded-xl text-xs font-semibold transition-all text-center whitespace-nowrap bg-slate-900 border border-slate-855 text-slate-400 hover:text-blue-400 hover:border-blue-900/30";
                        }
                    }
                }
            }

            // 【すべてのモードでプレースホルダー表示（Coming Soon）に統一】
            placeholderContainer.classList.remove('hidden');
            placeholderTitle.textContent = presets[index].name + "（近日公開）";
            placeholderDesc.innerHTML = `こちらの機能は現在、最高の体験をお届けするために開発＆準備中です。<br>「近日公開」予定ですので、どうぞ楽しみにお待ちください！`;

            lucide.createIcons();
        }

        // トースト通知を表示
        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 5000);
        }
    </script>

    <style>
        /* スムーズなアニメーション */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        /* スクロールバー非表示 */
        .scrollbar-none::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-none {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body>
</html>
